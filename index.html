<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Tracker V4</title>

<style>
body{font-family:Arial;margin:0;background:#111;color:#fff}
.nav{display:flex;gap:10px;padding:10px;background:#222}
button{padding:8px 12px;border:none;border-radius:6px;cursor:pointer}
.page{display:none;padding:20px}
.active{display:block}
.card{background:#1e1e1e;padding:12px;border-radius:10px;margin-bottom:10px}
.kpi{margin-bottom:15px;font-weight:bold}
</style>
</head>

<body>

<div class="nav">
  <button onclick="openPage('home')">Home</button>
  <button onclick="openPage('running')">Running</button>
  <button onclick="openPage('hiking')">Hiking</button>
  <button onclick="openPage('hybrid')">Hybrid</button>
</div>

<div id="home" class="page active">
  <h2>Home</h2>
</div>

<div id="running" class="page">
  <h2>Running</h2>
  <div id="run-list"></div>
</div>

<div id="hiking" class="page">
  <h2>Hiking</h2>
  <div id="hike-list"></div>
</div>

<div id="hybrid" class="page">
  <h2>Hiking + Trail</h2>
  <div id="kpi" class="kpi"></div>
  <div id="hybrid-list"></div>
</div>

<script>

// ===== DATI =====
const state = {
  workouts:[
    {title:"Trail Run", date:"2026-04-20", distance:10, elevGain:500, type:"trail"}
  ],
  hikes:[
    {title:"Monte Rosa", date:"2026-04-18", distance:8, elev:900}
  ]
};

// ===== DATE SAFE =====
function parseLocalDate(d){
  const [y,m,day]=d.split("-");
  return new Date(y, m-1, day);
}

// ===== NAV =====
function openPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById(p).classList.add('active');

  if(p==="running") renderRun();
  if(p==="hiking") renderHike();
  if(p==="hybrid") renderHybrid();
}

// ===== RUN =====
function renderRun(){
  const el=document.getElementById("run-list");
  el.innerHTML="";

  state.workouts.forEach(a=>{
    el.innerHTML+=`
      <div class="card">
        ${a.title}<br>
        ${a.distance} km | ${a.elevGain||0} m
      </div>`;
  });
}

// ===== HIKE =====
function renderHike(){
  const el=document.getElementById("hike-list");
  el.innerHTML="";

  state.hikes.forEach(a=>{
    el.innerHTML+=`
      <div class="card">
        ${a.title}<br>
        ${a.distance} km | ${a.elev||0} m
      </div>`;
  });
}

// ===== HYBRID (FIX VERO) =====
function renderHybrid(){
  const list=document.getElementById("hybrid-list");
  const kpi=document.getElementById("kpi");

  let all=[
    ...state.workouts
      .filter(w=>w.type==="trail")
      .map(w=>({...w,source:"trail"})),

    ...state.hikes.map(h=>({...h,source:"hike"}))
  ];

  // SORT CORRETTO
  all.sort((a,b)=>parseLocalDate(b.date)-parseLocalDate(a.date));

  // KPI CORRETTI
  const km=all.reduce((s,a)=>s+(Number(a.distance)||0),0);
  const elev=all.reduce((s,a)=>s+(Number(a.elevGain)||Number(a.elev)||0),0);

  kpi.innerHTML=`Tot KM: ${km} | D+: ${elev} | Attività: ${all.length}`;

  list.innerHTML="";

  if(all.length===0){
    list.innerHTML="<div class='card'>Nessuna attività</div>";
    return;
  }

  all.forEach(a=>{
    list.innerHTML+=`
      <div class="card">
        <b>${a.title}</b> (${a.source})<br>
        ${a.distance} km | ${a.elevGain||a.elev||0} m<br>
        ${a.date}
      </div>`;
  });
}

</script>

</body>
</html>
